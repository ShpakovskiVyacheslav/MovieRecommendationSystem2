<!doctype html>
<html>
<head>
    <title>Подтверждение кода</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/static/css/auth.css">
</head>
<body>
    <div class="container mt-5">
        <form class="login_form" method="post" action="/reset_confirm">
            <h2 class="form-title">Подтверждение кода</h2>
            <p>Код отправлен на {{ email }}</p>
            <input type="hidden" name="email" value="{{ email }}">
            <div class="mb-3">
                <label for="code" class="form-label">Код подтверждения</label>
                <input type="text" class="form-control" id="code" name="code" required>
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">Новый пароль</label>
                <input type="password" class="form-control" id="new_password" name="new_password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Повторите пароль</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Сменить пароль</button>
        </form>
    </div>
</body>
</html>
