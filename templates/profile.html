<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/static/css/style.css" />
    <title>Профиль пользователя</title>
    <script>
        function toggleGenre(element) {
            element.classList.toggle('active');
        }
        function applyFilters() {
            var genres = [];
            document.querySelectorAll('.filter-tag.active').forEach(function(tag) {
                genres.push(tag.getAttribute('data-genre'));
            });
            var rating = document.getElementById('rating').value;
            var year = document.getElementById('year').value;
            alert('Применены фильтры:\nЖанры: ' + (genres.join(', ') || 'не выбраны') + '\nРейтинг: ' + rating + '\nГод: ' + year);
        }
    </script>
</head>
<body>
    <div class="profile-page">
        <div class="profile-header">
            <div class="profile-avatar-section">
                <form method="post" enctype="multipart/form-data" id="avatar-form">
                    <label for="avatar-input">
                        <img src="{% if user.avatar %}/static/uploads/{{ user.avatar }}{% else %}https://via.placeholder.com/150{% endif %}"
                             alt="Avatar" class="profile-avatar">
                    </label>
                    <input type="file" name="avatar" id="avatar-input" accept="image/*" style="display: none;"
                           onchange="document.getElementById('avatar-form').submit()">
                </form>
                <button class="change-avatar-btn" onclick="document.getElementById('avatar-input').click();">Сменить фото</button>
            </div>

            <div class="profile-info-section">
                <div class="profile-username">{{ user.username }}</div>
                <div class="profile-email">{{ user.email }}</div>

                <div class="profile-stats">
                    <h3>Статистика</h3>
                    <div class="stat-item"><span class="stat-label">Просмотрено фильмов:</span><span class="stat-value">0</span></div>
                    <div class="stat-item"><span class="stat-label">В избранном:</span><span class="stat-value">0</span></div>
                    <div class="stat-item"><span class="stat-label">Оценок:</span><span class="stat-value">0</span></div>
                    <div class="stat-item"><span class="stat-label">Рецензий:</span><span class="stat-value">0</span></div>
                </div>
            </div>

            <div class="profile-filters">
                <h3>Фильтры</h3>
                <div class="filter-group">
                    <label>Жанры (нажмите чтобы выбрать)</label>
                    <div class="filter-tags">
                        <span class="filter-tag" data-genre="боевик" onclick="toggleGenre(this)">Боевик</span>
                        <span class="filter-tag" data-genre="комедия" onclick="toggleGenre(this)">Комедия</span>
                        <span class="filter-tag" data-genre="драма" onclick="toggleGenre(this)">Драма</span>
                        <span class="filter-tag" data-genre="фантастика" onclick="toggleGenre(this)">Фантастика</span>
                        <span class="filter-tag" data-genre="ужасы" onclick="toggleGenre(this)">Ужасы</span>
                        <span class="filter-tag active" data-genre="триллер" onclick="toggleGenre(this)">Триллер</span>
                        <span class="filter-tag" data-genre="мелодрама" onclick="toggleGenre(this)">Мелодрама</span>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="rating">Рейтинг</label>
                    <select class="filter-select" id="rating">
                        <option value="any">Любой</option>
                        <option value="8">Выше 8</option>
                        <option value="7">Выше 7</option>
                        <option value="6">Выше 6</option>
                        <option value="5">Выше 5</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="year">Год</label>
                    <select class="filter-select" id="year">
                        <option value="all">Все годы</option>
                        <option value="2020-2024">2020-2024</option>
                        <option value="2010-2019">2010-2019</option>
                        <option value="2000-2009">2000-2009</option>
                        <option value="1990-1999">1990-1999</option>
                    </select>
                </div>

                <button class="apply-filters-btn" onclick="applyFilters()">Применить фильтры</button>
            </div>
        </div>

        <div class="favorites-section">
            <h3>Избранные фильмы</h3>
            <div class="favorites-placeholder">Здесь пока ничего нет, но скоро появится</div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/main/{{ login }}" style="color: #0d6efd; text-decoration: none;">← Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
