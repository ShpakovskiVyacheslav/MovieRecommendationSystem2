<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/static/css/base.css">
    <link rel="stylesheet" type="text/css" href="/static/css/auth.css">
    <title>Сброс пароля</title>
</head>
<body>
    <div class="container mt-5">
        <form class="login_form" method="post">
            <h2 class="form-title">Сброс пароля</h2>
            <div class="reset-code">{{ reset_code }}</div>
            <p class="text-center text-muted mb-4">Введите этот код для подтверждения</p>
            <div class="mb-3">
                <label for="reset_code" class="form-label">Код подтверждения</label>
                <input type="text" class="form-control" id="reset_code" name="reset_code" placeholder="Введите код" required>
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">Новый пароль</label>
                <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Введите новый пароль" required>
            </div>
            <div class="mb-3">
                <label for="confirm_new_password" class="form-label">Повторите новый пароль</label>
                <input type="password" class="form-control" id="confirm_new_password" name="confirm_new_password" placeholder="Повторите новый пароль" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Сбросить пароль</button>
            <div class="switch-link">
                <a href="/">Вернуться к входу</a>
            </div>
        </form>
    </div>
</body>
</html>
