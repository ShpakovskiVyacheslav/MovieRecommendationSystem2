<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/static/css/base.css">
    <link rel="stylesheet" type="text/css" href="/static/css/auth.css">
    <title>Регистрация</title>
    <style>
        .alert {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 5px;
        }
        .alert-error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <form class="login_form" method="post">
            <h2 class="form-title">Регистрация</h2>

            {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
            {% endif %}

            <div class="mb-3">
                <label for="email" class="form-label">Почта</label>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="Введите email" value="{{ email or '' }}" required>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Введите имя пользователя" value="{{ username or '' }}" required>
            </div>

            <div class="mb-3">
                <label for="login" class="form-label">Логин</label>
                <input type="text" class="form-control" id="login" name="login"
                       placeholder="Введите логин" value="{{ login or '' }}" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Введите пароль" required>
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">Повторите пароль</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                       placeholder="Повторите пароль" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>

            <div class="switch-link">
                <a href="/">Уже есть аккаунт? Войти</a>
            </div>
        </form>
    </div>
</body>
</html>
