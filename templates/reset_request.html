<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/static/css/auth.css">
    <title>Сброс пароля</title>
</head>
<body>
    <div class="container mt-5">
        <form class="login_form" method="post">
            <h2 class="form-title">Восстановление пароля</h2>
            <p class="text-muted text-center mb-4">Введите email, на который будет отправлен код для сброса пароля</p>

            {% if error %}
            <div class="alert alert-danger" style="background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px; border-radius: 5px; margin-bottom: 20px;">
                {{ error }}
            </div>
            {% endif %}

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="example@mail.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Отправить код</button>
            <div class="switch-link">
                <a href="/">Вернуться ко входу</a>
            </div>
        </form>
    </div>
</body>
</html>
