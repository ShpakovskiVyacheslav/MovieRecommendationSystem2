<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/static/css/auth.css">
    <title>Сброс пароля</title>
    <style>
        .password-requirements {
            margin-top: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
        }
        .requirement {
            margin: 6px 0;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .requirement.valid {
            color: #198754;
            background: #d1e7dd;
        }
        .requirement.invalid {
            color: #dc3545;
            background: #f8d7da;
        }
        .password-strength {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }
        .strength-weak {
            background: #dc3545;
            color: white;
        }
        .strength-medium {
            background: #ffc107;
            color: #333;
        }
        .strength-strong {
            background: #198754;
            color: white;
        }
        .alert {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 5px;
        }
        .alert-error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .alert-success {
            background-color: #d1e7dd;
            border: 1px solid #badbcc;
            color: #0f5132;
        }
        .form-control.valid {
            border-color: #198754;
            background-color: #d1e7dd;
        }
        .form-control.invalid {
            border-color: #dc3545;
            background-color: #f8d7da;
        }
        .code-hint {
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <form class="login_form" method="post" action="/reset_confirm" id="resetForm">
            <h2 class="form-title">Сброс пароля</h2>

            <div id="errorMessage" class="alert alert-error" style="display: none;"></div>

            <input type="hidden" name="email" value="{{ email }}">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" class="form-control" value="{{ email }}" disabled style="background-color: #e9ecef;">
                <div class="code-hint" style="color: #198754; margin-top: 5px;">✓ Почта подтверждена</div>
            </div>

            <div class="mb-3">
                <label for="code" class="form-label">Код подтверждения</label>
                <input type="text" class="form-control" id="code" name="code" placeholder="Введите код из письма" required>
            </div>

            <div class="mb-3">
                <label for="new_password" class="form-label">Новый пароль</label>
                <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Введите новый пароль" required>

                <div class="password-requirements">
                    <strong>Требования к паролю:</strong>
                    <div id="lengthReq" class="requirement invalid">✗ 8-16 символов</div>
                    <div id="lowercaseReq" class="requirement invalid">✗ Строчные буквы (a-z)</div>
                    <div id="uppercaseReq" class="requirement invalid">✗ Заглавные буквы (A-Z)</div>
                    <div id="digitReq" class="requirement invalid">✗ Цифры (0-9)</div>
                    <div id="specialReq" class="requirement invalid">✗ Спецсимволы (!@#$%^&*)</div>
                </div>

                <div id="strengthBox" class="password-strength strength-weak" style="display: none;">
                    Надежность: <span id="strengthText">Слабый</span>
                </div>
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">Повторите пароль</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Повторите пароль" required>
                <div id="confirmError" style="color: #dc3545; font-size: 12px; margin-top: 5px; display: none;">
                    ✗ Пароли не совпадают
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="submitBtn" disabled>Сменить пароль</button>

            <div class="switch-link">
                <a href="/">Вернуться ко входу</a>
            </div>
        </form>
    </div>

    <script>
        const codeInput = document.getElementById('code');
        const passwordInput = document.getElementById('new_password');
        const confirmInput = document.getElementById('confirm_password');
        const submitBtn = document.getElementById('submitBtn');
        const confirmError = document.getElementById('confirmError');
        const strengthBox = document.getElementById('strengthBox');
        const strengthText = document.getElementById('strengthText');
        const resetForm = document.getElementById('resetForm');
        const errorMessage = document.getElementById('errorMessage');

        const lengthReq = document.getElementById('lengthReq');
        const lowercaseReq = document.getElementById('lowercaseReq');
        const uppercaseReq = document.getElementById('uppercaseReq');
        const digitReq = document.getElementById('digitReq');
        const specialReq = document.getElementById('specialReq');

        function checkPasswordStrength(password) {
            const lengthValid = password.length >= 8 && password.length <= 16;
            const lowercaseValid = /[a-z]/.test(password);
            const uppercaseValid = /[A-Z]/.test(password);
            const digitValid = /[0-9]/.test(password);
            const specialValid = /[!@#$%^&*]/.test(password);

            lengthReq.className = lengthValid ? 'requirement valid' : 'requirement invalid';
            lengthReq.innerHTML = lengthValid ? '✓ 8-16 символов' : '✗ 8-16 символов';

            lowercaseReq.className = lowercaseValid ? 'requirement valid' : 'requirement invalid';
            lowercaseReq.innerHTML = lowercaseValid ? '✓ Строчные буквы (a-z)' : '✗ Строчные буквы (a-z)';

            uppercaseReq.className = uppercaseValid ? 'requirement valid' : 'requirement invalid';
            uppercaseReq.innerHTML = uppercaseValid ? '✓ Заглавные буквы (A-Z)' : '✗ Заглавные буквы (A-Z)';

            digitReq.className = digitValid ? 'requirement valid' : 'requirement invalid';
            digitReq.innerHTML = digitValid ? '✓ Цифры (0-9)' : '✗ Цифры (0-9)';

            specialReq.className = specialValid ? 'requirement valid' : 'requirement invalid';
            specialReq.innerHTML = specialValid ? '✓ Спецсимволы (!@#$%^&*)' : '✗ Спецсимволы (!@#$%^&*)';

            const allValid = lengthValid && lowercaseValid && uppercaseValid && digitValid && specialValid;

            if (password.length > 0) {
                strengthBox.style.display = 'block';

                let strength = 0;
                if (lengthValid) strength++;
                if (lowercaseValid) strength++;
                if (uppercaseValid) strength++;
                if (digitValid) strength++;
                if (specialValid) strength++;

                strengthBox.classList.remove('strength-weak', 'strength-medium', 'strength-strong');

                if (strength <= 2) {
                    strengthBox.classList.add('strength-weak');
                    strengthText.innerText = 'Слабый';
                } else if (strength <= 4) {
                    strengthBox.classList.add('strength-medium');
                    strengthText.innerText = 'Средний';
                } else {
                    strengthBox.classList.add('strength-strong');
                    strengthText.innerText = 'Сильный';
                }
            } else {
                strengthBox.style.display = 'none';
            }

            return allValid;
        }

        function checkPasswordsMatch() {
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (confirm.length > 0 && password !== confirm) {
                confirmError.style.display = 'block';
                return false;
            } else {
                confirmError.style.display = 'none';
                return true;
            }
        }

        function updateSubmitButton() {
            const passwordValid = checkPasswordStrength(passwordInput.value);
            const passwordsMatch = checkPasswordsMatch();
            const passwordNotEmpty = passwordInput.value.length > 0;
            const codeNotEmpty = codeInput.value.length > 0;

            if (passwordValid && passwordsMatch && passwordNotEmpty && codeNotEmpty) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        }

        // Отправка формы через AJAX
        resetForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(resetForm);

            try {
                const response = await fetch('/reset_confirm', {
                    method: 'POST',
                    body: formData
                });

                const text = await response.text();

                // Проверяем разные варианты ошибок
                if (text.includes('Неверный код')) {
                    errorMessage.style.display = 'block';
                    errorMessage.innerHTML = '❌ Неверный код подтверждения. Попробуйте ещё раз.';
                    codeInput.classList.add('invalid');
                    setTimeout(() => {
                        errorMessage.style.display = 'none';
                        codeInput.classList.remove('invalid');
                    }, 3000);
                } else if (text.includes('Пароли не совпадают')) {
                    errorMessage.style.display = 'block';
                    errorMessage.innerHTML = '❌ Пароли не совпадают';
                    setTimeout(() => {
                        errorMessage.style.display = 'none';
                    }, 3000);
                } else if (text.includes('Код истёк')) {
                    errorMessage.style.display = 'block';
                    errorMessage.innerHTML = '❌ Код истёк. Запросите новый код.';
                    setTimeout(() => {
                        errorMessage.style.display = 'none';
                        window.location.href = '/reset';
                    }, 3000);
                } else if (response.ok || text.includes('redirect')) {
                    // Успешная смена пароля
                    window.location.href = '/';
                } else {
                    errorMessage.style.display = 'block';
                    errorMessage.innerHTML = '❌ Ошибка. Попробуйте ещё раз.';
                    setTimeout(() => {
                        errorMessage.style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                errorMessage.style.display = 'block';
                errorMessage.innerHTML = '❌ Ошибка соединения. Попробуйте ещё раз.';
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        });

        codeInput.addEventListener('input', function() {
            updateSubmitButton();
        });

        passwordInput.addEventListener('input', function() {
            checkPasswordStrength(this.value);
            updateSubmitButton();
        });

        confirmInput.addEventListener('input', function() {
            checkPasswordsMatch();
            updateSubmitButton();
        });
    </script>
</body>
</html>
